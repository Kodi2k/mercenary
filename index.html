<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Grocery Mercenary</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3724/3724720.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0F172A; --card: #1E293B; --green: #22C55E; --blue: #3B82F6; --text: #f8fafc; --sub: #94a3b8; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 90px; }
    
    /* 1. PROFESSIONAL HEADER STYLE */
    header { padding: 10px 0 20px 0; text-align: left; border-bottom: 1px solid #334155; margin-bottom: 15px; }
    .title-row { display: flex; align-items: center; }
    h1 { color: var(--green); font-size: 20px; margin: 0; font-weight: bold; }
    .subtitle { color: var(--text); font-size: 11px; margin-top: 3px; font-weight: normal; opacity: 0.8; text-transform: none; }
    #status { color: var(--green); font-size: 12px; margin-top: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

    .card { background: var(--card); padding: 18px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .btn { background: var(--green); color: white; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; font-size: 15px; box-sizing: border-box; display: block; text-align: center; text-decoration: none; }
    input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0c111e; color: var(--text); font-size: 16px; box-sizing: border-box; }
    
    /* 2. NAVIGATION ICONS AND STATES (SVG) */
    .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; height: 75px; border-top: 1px solid #334155; z-index: 1000; justify-content: space-around; padding: 5px 0; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--sub); font-size: 11px; font-weight: bold; cursor: pointer; text-decoration: none; position: relative; }
    .nav-item.active { color: var(--green); }
    .nav-item.active::before { content: ''; position: absolute; top: -5px; left: 20px; right: 20px; height: 3px; background: var(--green); border-radius: 2px; }
    .nav-icon { width: 22px; height: 22px; margin-bottom: 4px; fill: currentColor; }
    
    /* 3. RED NOTIFICATION BADGE (BULLSEYE) */
    .badge { position: absolute; top: 1px; right: 28px; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; box-shadow: 0 0 6px rgba(239, 68, 68, 0.6); }

    .log-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #334155; font-size: 14px; background: #141b2b; }
    .hidden { display: none !important; }
    .active-row { border: 2px solid var(--green); box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }
  </style>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

  <header>
    <div class="title-row">
      <span style="font-size:22px; margin-right:8px;">🛒</span>
      <h1>Grocery Mercenary</h1>
    </div>
    <div class="subtitle">LOCAL PRICE AGENT</div>
    <div id="status">System Ready</div>
  </header>

  <div id="view-scan">
    <div id="box-camera" class="card">
      <label for="file-up" class="btn">📸 SNAP BARCODE</label>
      <input type="file" id="file-up" accept="image/*" capture="environment" onchange="runScan(this)" style="display:none">
    </div>

    <div id="box-form" class="card hidden active-row">
      <input type="text" id="in-name" placeholder="Item Name">
      <select id="in-freq">
        <option value="1">Daily Essentials</option>
        <option value="7">Weekly Staples</option>
        <option value="14">Bi-Weekly Stock</option>
        <option value="30" selected>Monthly Supply</option>
      </select>
      <button class="btn" onclick="saveNow()">✅ ADD TO PANTRY</button>
      <button class="btn" style="background:#475569" onclick="resetApp()">CANCEL</button>
    </div>

    <div style="font-size:12px; color:var(--green); margin: 15px 0 5px 0; font-weight:bold; text-transform:uppercase;">Recent Pantry Logs</div>
    <div id="log-container" class="card" style="padding:0; overflow:hidden;"></div>
  </div>

  <div id="view-deals" class="hidden">
    <h1>🎯 Refill Targets</h1>
    <div class="subtitle" style="margin-bottom:20px">Active Price Comparison Hunts</div>
    <div class="card" style="border:1px solid var(--blue)">
      <input type="text" id="q-search" placeholder="Quick Search Ribeye Steak, etc.">
      <button class="btn" style="background:var(--blue); font-size:14px;" onclick="hunt()">🔍 FIND LOCAL PRICES</button>
    </div>
    <div id="deals-list"></div>
  </div>

  <div class="nav">
    <div class="nav-item active" id="n-scan" onclick="go('scan')">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 9a3 3 0 1 1-3 3 3 3 0 0 1 3-3m10 3a2 2 0 0 0-2-2h-3.17a2 2 0 0 1-1.41-.59l-.83-.82A4 4 0 0 0 11.76 7H12.2a4 4 0 0 0-2.83 1.17l-.82.83a2 2 0 0 1-1.41.59H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM12 18a6 6 0 1 1 6-6 6 6 0 0 1-6 6z" fill-rule="evenodd"></path></svg>
      SCANNER
    </div>
    <div class="nav-item" id="n-deals" onclick="go('deals')">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm0-14a6 6 0 1 0 6 6 6 6 0 0 0-6-6zm0 10a4 4 0 1 1 4-4 4 4 0 0 1-4 4zm0-6a2 2 0 1 0 2 2 2 2 0 0 0-2-2z" fill-rule="evenodd"></path></svg>
      PRICE HUNTER
      <div class="badge">1</div> </div>
  </div>

<script>
  let sku = "MANUAL";
  const reader = new Html5Qrcode("status");
  if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.log("SW failed", err)); }); }

  function runScan(input) {
    if (!input.files[0]) return;
    document.getElementById('status').innerText = "📡 ANALYZING TARGET...";
    reader.scanFile(input.files[0], true).then(res => { sku = res; openForm(); }).catch(e => { sku = "MANUAL"; openForm(); });
  }

  function openForm() {
    document.getElementById('box-camera').classList.add('hidden');
    document.getElementById('box-form').classList.remove('hidden');
    document.getElementById('status').innerText = "BARCODE ACQUIRED";
  }

  function resetApp() {
    document.getElementById('box-form').classList.add('hidden');
    document.getElementById('box-camera').classList.remove('hidden');
    document.getElementById('in-name').value = "";
    document.getElementById('file-up').value = "";
    document.getElementById('status').innerText = "SYSTEM READY";
    updateLog();
  }

  function saveNow() {
    const name = document.getElementById('in-name').value;
    if (!name) return alert("Name item!");
    const p = JSON.parse(localStorage.getItem('pantry_db') || "[]");
    p.unshift({ n: name, f: document.getElementById('in-freq').value, d: Date.now(), s: sku });
    localStorage.setItem('pantry_db', JSON.stringify(p));
    document.getElementById('status').innerText = "✅ TARGET SAVED!";
    resetApp();
  }

  function updateLog() {
    const p = JSON.parse(localStorage.getItem('pantry_db') || "[]");
    const container = document.getElementById('log-container');
    container.innerHTML = p.slice(0, 10).map(i => `
      <div class="log-row"><span><b>${i.n}</b></span><span style="color:#22C55E; font-size:10px; text-transform:uppercase;">● LOGGED</span></div>
    `).join('') || "<p style='padding:20px;color:var(--sub); font-size:12px;'>Waiting for first acquisition.</p>";
  }

  function hunt() {
    const q = document.getElementById('q-search').value;
    if (!q) return;
    window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}+prices+near+me&tbm=shop`, '_blank');
  }

  function go(v) {
    document.getElementById('view-scan').classList.toggle('hidden', v !== 'scan');
    document.getElementById('view-deals').classList.toggle('hidden', v !== 'deals');
    document.getElementById('n-scan').classList.toggle('active', v === 'scan');
    document.getElementById('n-deals').classList.toggle('active', v === 'deals');
    if (v === 'deals') renderDeals();
    if (v === 'scan') updateLog();
  }

  function renderDeals() {
    const p = JSON.parse(localStorage.getItem('pantry_db') || "[]");
    const now = Date.now();
    const list = document.getElementById('deals-list');
    const items = p.filter(i => (now - i.d) / 86400000 >= (i.f - 3));
    list.innerHTML = items.map(i => `
      <div class="card log-row" style="margin-bottom:10px; padding:15px; border-radius:10px; border:none; display:flex; justify-content:space-between; align-items:center;">
        <div><b>${i.n}</b><br><small style="color:#fbbf24">Refill Recommendation</small></div>
        <button class="btn" style="width:auto; padding:10px 15px; margin:0; background:var(--blue); font-size:12px; font-weight:normal;" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(i.n)}+prices+near+me&tbm=shop','_blank')">COMPARE</button>
      </div>
    `).join('') || "<p style='text-align:center;color:var(--sub); padding:40px 0;'>All targets stocked.</p>";
  }

  window.onload = updateLog;
</script>
</body>
</html>
