<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Grocery Mercenary</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3724/3724720.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    :root { --bg: #0F172A; --card: #1E293B; --green: #22C55E; --blue: #3B82F6; --text: #f8fafc; --sub: #94a3b8; }
    
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }

    /* --- CENTERED PROFESSIONAL HEADER --- */
    header { 
      padding: 30px 0 25px 0; 
      text-align: center; 
      border-bottom: 1px solid #334155; 
      margin-bottom: 25px; 
    }
    .title-row { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 10px;
    }
    h1 { color: var(--green); font-size: 24px; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
    .subtitle { 
      color: var(--text); 
      font-size: 11px; 
      margin-top: 6px; 
      font-weight: 700; 
      opacity: 0.7; 
      text-transform: uppercase; 
      letter-spacing: 2.5px;
    }
    #status { 
      color: var(--green); 
      font-size: 10px; 
      margin-top: 12px; 
      font-weight: 800; 
      text-transform: uppercase; 
      letter-spacing: 1.5px;
      background: rgba(34, 197, 94, 0.15); 
      display: inline-block;
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    /* --- UI COMPONENTS --- */
    .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
    .btn { background: var(--green); color: white; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; font-size: 16px; display: block; text-align: center; text-decoration: none; transition: transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    
    input, select { width: 100%; padding: 16px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0c111e; color: var(--text); font-size: 16px; box-sizing: border-box; outline: none; }
    input:focus { border-color: var(--green); }

   /* --- NAVIGATION CLICK-FIX --- */
    .nav { 
      position: fixed; 
      bottom: 0; 
      left: 0; 
      width: 100%; 
      background: var(--card); 
      display: flex; 
      height: 75px; 
      border-top: 1px solid #334155; 
      z-index: 9999; 
      justify-content: space-around; 
      padding: 0;
      margin: 0;
    }
    .nav-item { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      color: var(--sub); 
      font-size: 11px; 
      font-weight: 700; 
      cursor: pointer; 
      position: relative; 
      height: 100%; 
      background: transparent;
      border: none;
      -webkit-tap-highlight-color: rgba(34, 197, 94, 0.2);
    }
    .nav-item.active { color: var(--green); }
    .nav-item.active::before { 
      content: ''; 
      position: absolute; 
      top: 0; 
      left: 15%; 
      right: 15%; 
      height: 3px; 
      background: var(--green); 
      border-radius: 0 0 4px 4px; 
    }
    .nav-icon { 
      width: 24px; 
      height: 24px; 
      margin-bottom: 4px; 
      fill: currentColor; 
      pointer-events: none; 
    }
    
    /* --- NOTIFICATION BADGE --- */
    .badge { position: absolute; top: 12px; right: 30%; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border: 2px solid var(--card); }

    .log-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #334155; font-size: 14px; align-items: center; }
    .hidden { display: none !important; }
    
    /* --- DEALS STYLING --- */
    .deal-card { border-left: 4px solid var(--blue); }
  </style>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

  <header>
    <div class="title-row">
      <span style="font-size:24px;">🛒</span>
      <h1>Grocery Mercenary</h1>
    </div>
    <div class="subtitle">LOCAL PRICE AGENT</div>
    <div id="status">SYSTEM READY</div>
  </header>

  <div id="view-scan">
    <div id="box-camera" class="card">
      <label for="file-up" class="btn">📸 SNAP BARCODE</label>
      <input type="file" id="file-up" accept="image/*" capture="environment" onchange="runScan(this)" style="display:none">
    </div>

    <div id="box-form" class="card hidden" style="border: 2px solid var(--green);">
      <h3 style="margin-top:0; color:var(--green)">TARGET ACQUIRED</h3>
      <input type="text" id="in-name" placeholder="Item Name (e.g. Bread)">
      <select id="in-freq">
        <option value="1">Daily Essentials</option>
        <option value="7">Weekly Staples</option>
        <option value="14">Bi-Weekly Stock</option>
        <option value="30" selected>Monthly Supply</option>
      </select>
      <button class="btn" onclick="saveNow()">✅ ADD TO PANTRY</button>
      <button class="btn" style="background:#475569; margin-top:10px;" onclick="resetApp()">CANCEL</button>
    </div>

    <div style="font-size:11px; color:var(--green); margin: 20px 0 8px 0; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Recent Pantry Logs</div>
    <div id="log-container" class="card" style="padding:0; overflow:hidden;"></div>
  </div>

  <div id="view-deals" class="hidden">
    <h1>🎯 Price Hunter</h1>
    <div class="subtitle" style="margin-bottom:20px">Active Local Price Comparison</div>
    <div class="card">
      <input type="text" id="q-search" placeholder="Quick Search (e.g. Ribeye Steak)">
      <button class="btn" style="background:var(--blue);" onclick="hunt()">🔍 FIND LOCAL PRICES</button>
    </div>
    <div id="deals-list"></div>
  </div>

  <div class="nav">
    <div class="nav-item active" id="n-scan">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 9a3 3 0 1 1-3 3 3 3 0 0 1 3-3m10 3a2 2 0 0 0-2-2h-3.17a2 2 0 0 1-1.41-.59l-.83-.82A4 4 0 0 0 11.76 7H12.2a4 4 0 0 0-2.83 1.17l-.82.83a2 2 0 0 1-1.41.59H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM12 18a6 6 0 1 1 6-6 6 6 0 0 1-6 6z"></path></svg>
      SCANNER
    </div>
    <div class="nav-item" id="n-deals">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm0-14a6 6 0 1 0 6 6 6 6 0 0 0-6-6zm0 10a4 4 0 1 1 4-4 4 4 0 0 1-4 4zm0-6a2 2 0 1 0 2 2 2 2 0 0 0-2-2z"></path></svg>
      PRICE HUNTER
      <div id="nav-badge" class="badge hidden">0</div>
    </div>
  </div>

<script>
  let sku = "MANUAL";
  const reader = new Html5Qrcode("status");
  if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(e => {}); }); }

  function runScan(input) {
    if (!input.files[0]) return;
    document.getElementById('status').innerText = "📡 ANALYZING...";
    reader.scanFile(input.files[0], true).then(res => { sku = res; openForm(); }).catch(e => { sku = "MANUAL"; openForm(); });
  }

  function openForm() {
    document.getElementById('box-camera').classList.add('hidden');
    document.getElementById('box-form').classList.remove('hidden');
    document.getElementById('status').innerText = "TARGET IDENTIFIED";
  }

  function resetApp() {
    document.getElementById('box-form').classList.add('hidden');
    document.getElementById('box-camera').classList.remove('hidden');
    document.getElementById('in-name').value = "";
    document.getElementById('file-up').value = "";
    document.getElementById('status').innerText = "SYSTEM READY";
    updateLog();
  }

  function saveNow() {
    const name = document.getElementById('in-name').value;
    if (!name) return alert("Enter Name!");
    const p = JSON.parse(localStorage.getItem('pantry_db') || "[]");
    p.unshift({ n: name, f: document.getElementById('in-freq').value, d: Date.now(), s: sku });
    localStorage.setItem('pantry_db', JSON.stringify(p));
    document.getElementById('status').innerText = "✅ SAVED TO PANTRY";
    resetApp();
  }

  function updateLog() {
    const p = JSON.parse(localStorage.getItem('pantry_db') || "[]");
    const container = document.getElementById('log-container');
    container.innerHTML = p.slice(0, 10).map(i => `
      <div class="log-row"><span><b>${i.n}</b></span><span style="color:var(--green); font-size:10px; font-weight:800;">● LOGGED</span></div>
    `).join('') || "<p style='padding:25px;color:var(--sub); font-size:12px; text-align:center;'>Ready for your first scan.</p>";
    refreshBadge();
  }

  function refreshBadge() {
    const p = JSON.parse(localStorage.getItem('pantry_db') || "[]");
    const now = Date.now();
    const count = p.filter(i => (now - i.d) / 86400000 >= (i.f - 3)).length;
    const b = document.getElementById('nav-badge');
    if (count > 0) { b.innerText = count; b.classList.remove('hidden'); } 
    else { b.classList.add('hidden');
